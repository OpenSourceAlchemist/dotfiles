# GitLab CI Configuration for dotfiles
# Tests shell script syntax, validates documentation, and runs sanity checks

image: alpine:latest

# Default variables
variables:
  GIT_STRATEGY: clone
  SHELLCHECK_VERSION: "0.10.0"

# Workflow rules to prevent unnecessary runs
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != "main"
      changes:
        - "*.sh"
        - "*.md"
        - ".gitlab-ci.yml"
        - "bash/*"
        - "zsh/*"
        - "vim/*"
        - "tmux/*"
        - "git/*"
    - if: $CI_COMMIT_BRANCH == "main"

stages:
  - validate
  - test
  - security
  - build

#
# VALIDATE STAGE
#

shellcheck:
  stage: validate
  image: koalaman/shellcheck:stable
  script:
    - echo "Running shellcheck on all shell scripts..."
    - shellcheck --version
    - shellcheck -e SC1091 -e SC2002 -e SC2154 install.sh
    - shellcheck -e SC1091 -e SC2002 -e SC2154 bootstrap.sh
  artifacts:
    reports:
      junit: shellcheck-report.xml
  rules:
    - changes:
        - install.sh
        - bootstrap.sh
        - .gitlab-ci.yml

bash_syntax:
  stage: validate
  script:
    - sh -n install.sh
    - sh -n bootstrap.sh
    - echo "✓ All bash scripts have valid syntax"
  rules:
    - changes:
        - "*.sh"
        - ".gitlab-ci.yml"

markdown_lint:
  stage: validate
  image: node:latest
  script:
    - npm install -g markdownlint-cli@0.37.0
    - markdownlint README.md INSTALL.md TODO.md
  rules:
    - changes:
        - "*.md"
        - ".gitlab-ci.yml"

validate_yaml:
  stage: validate
  script:
    - apt-get update -qq
    - apt-get install -y python3-yaml -qq
    - python3 -c "import yaml; yaml.safe_load(open('.gitlab-ci.yml'))"
    - echo "✓ GitLab CI YAML is valid"
  rules:
    - changes:
        - ".gitlab-ci.yml"

#
# TEST STAGE
#

test_debian:
  stage: test
  image: debian:bookworm
  script:
    - apt-get update -qq
    - apt-get install -y -qq bash coreutils findutils grep
    - bash -n /workspace/install.sh
    - bash -n /workspace/bootstrap.sh
    - echo "✓ Debian syntax validation passed"
  variables:
    GIT_DEPTH: 1
  artifacts:
    paths:
      - test-results/
    when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

test_alpine:
  stage: test
  image: alpine:latest
  install:
    - apk add --no-cache bash
  script:
    - bash -n /workspace/install.sh
    - bash -n /workspace/bootstrap.sh
    - echo "✓ Alpine syntax validation passed"
  variables:
    GIT_DEPTH: 1
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

test_install_script_sanity:
  stage: test
  image: debian:bookworm
  script:
    - apt-get update -qq
    - apt-get install -y -qq shellcheck
    # Run install.sh with --dry-run if supported, otherwise just validate it runs
    - mkdir -p /tmp/test-home
    - export HOME=/tmp/test-home
    # Simulate what install.sh does without actually creating symlinks
    - echo "Testing install.sh logic..."
    - bash -c '
        set -e
        DOTFILES_DIR=$(pwd)
        TEST_HOME=/tmp/test-home
        echo "Installing to $TEST_HOME from $DOTFILES_DIR"
        if [ -d "$DOTFILES_DIR" ]; then
          echo "✓ DOTFILES_DIR exists"
        fi
        if [ -n "$TEST_HOME" ]; then
          echo "✓ TEST_HOME set correctly"
        fi
      '
    - echo "✓ install.sh sanity check passed"
  rules:
    - changes:
        - install.sh
        - .gitlab-ci.yml

test_bootstrap_script_sanity:
  stage: test
  image: debian:bookworm
  script:
    - apt-get update -qq
    - apt-get install -y -qq shellcheck grep findutils
    # Test OS detection logic from bootstrap.sh
    - echo "Testing bootstrap.sh OS detection..."
    - bash -c '
        set -e
        source ./bootstrap.sh 2>/dev/null || true
      ' 2>&1 | grep -E "OS detected|Dependencies" && true
    - echo "✓ bootstrap.sh logic validation passed"
  rules:
    - changes:
        - bootstrap.sh
        - .gitlab-ci.yml

#
# SECURITY STAGE
#

secret_scanning:
  stage: security
  image: alpine:latest
  before_script:
    - apk add --no-cache grep
  script:
    - | # Check for hardcoded secrets (excluding comments and documentation)
      echo "Scanning for potential secrets..."
      if grep -rEi '(password|secret|api_key|token|private_key)['"'"'"'":]' . --include="*.sh" --include="*.py" 2>/dev/null | grep -v "^#"; then
        echo "WARNING: Potential secrets found. Please review."
        exit 1
      fi
    - echo "✓ No obvious secrets found"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

secret-scanning-trufflehog:
  stage: security
  image: trufflesecurity/trufflehog:latest
  script:
    - echo "Running trufflehog secret scan..."
    - trufflehog git file://. --only-verified 2>&1 | tee trufflehog_output.log || true
    # Check if any secrets were found (exit code 0 means no secrets)
    - grep -q "no verified findings" trufflehog_output.log || \
      grep -q "No secrets found" trufflehog_output.log && \
      echo "✓ No verified secrets found" || \
      (echo "⚠ Potential secrets found, review manually" && true)
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  allow_failure: true

gitignore_check:
  stage: security
  script:
    - echo "Checking .gitignore completeness..."
    - if [ ! -f .gitignore ]; then
        echo "ERROR: .gitignore file is missing";
        exit 1;
      fi
    - echo "✓ .gitignore exists"
    # Verify sensitive files are included
    - if grep -q "\.ssh/" .gitignore; then
        echo "✓ SSH configs are gitignored";
      else
        echo "WARNING: SSH configs should be gitignored";
      fi
  rules:
    - changes:
        - .gitignore
        - ".gitlab-ci.yml"

#
# BUILD STAGE
#

# Create documentation archive
build_docs:
  stage: build
  image: alpine:latest
  before_script:
    - apk add --no-cache git
  script:
    - echo "Building documentation..."
    # Create a summary of the installation process
    - echo "# Quick Reference" > docs_quick_ref.md
    - echo "" >> docs_quick_ref.md
    - echo "## Scripts" >> docs_quick_ref.md
    - grep -h "^## " README.md >> docs_quick_ref.md || true
    - echo "" >> docs_quick_ref.md
    - echo "## Files" >> docs_quick_ref.md
    - find . -maxdepth 2 -name "*.sh" -o -name "*.md" | grep -E "\.sh$|\.md$" | sort >> docs_quick_ref.md
    - echo "✓ Documentation built successfully"
  artifacts:
    paths:
      - docs_quick_ref.md
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Generate installation instructions summary
build_install_summary:
  stage: build
  image: alpine:latest
  before_script:
    - apk add --no-cache bash
  script:
    - echo "Generating installation summary..."
    - {
      echo "## Installation Summary",
      echo "",
      echo "### Quick Start",
      echo '```bash',
      echo "./bootstrap.sh",
      echo "./install.sh",
      echo '```',
      echo "",
      echo "### Supported Distributions",
      grep -A 10 "## Supported Systems" README.md | grep "^-" | sed 's/-/  -/' >> INSTALL_SUMMARY.md
      } > INSTALL_SUMMARY.md
    - echo "✓ Installation summary generated"
  artifacts:
    paths:
      - INSTALL_SUMMARY.md
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

#
# MANUAL STAGE (for manual triggers)
#

manual_test_full_install:
  stage: .post
  image: debian:bookworm
  script:
    - echo "This is a placeholder for full end-to-end testing"
    - echo "Run this manually on a fresh VM to validate full install"
    - echo ""
    - echo "To run a real test:"
    - echo "  1. Create a fresh Debian/Ubuntu VM"
    - echo "  2. Clone this repository"
    - echo "  3. Run: ./bootstrap.sh"
    - echo "  4. Run: ./install.sh"
    - echo "  5. Verify: ls -la ~/.bashrc ~/.zshrc ~/.tmux.conf"
  allow_failure: true
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Manual check on specific file changes
manual_shellcheck_all:
  stage: security
  image: koalaman/shellcheck:stable
  script:
    - echo "Running comprehensive shellcheck on all shell files..."
    - find . -name "*.sh" -type f -exec shellcheck --severity=warning {} \;
  when: manual
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"

manual_lint_all:
  stage: validate
  image: node:latest
  script:
    - npm install -g markdownlint-cli@0.37.0 shellcheck
    - echo "Checking all markdown files..."
    - markdownlint *.md
    - echo "Checking all shell files..."
    - find . -name "*.sh" -type f -exec shellcheck {} \;
  when: manual
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"

#
# Caching and parallelization helpers
#

.cached_runner:
  cache:
    key: "dotfiles-cache"
    paths:
      - .cache/
      - node_modules/

.docker_pull:
  before_script:
    - docker pull $CI_REGISTRY_IMAGE:latest 2>/dev/null || true
